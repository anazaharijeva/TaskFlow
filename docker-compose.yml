# TaskFlow - Full stack with Docker Compose
# Services: frontend, backend, postgres, redis

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ASP.NET Core backend
  backend:
    build:
      context: ./TaskFlow.API
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=taskflow;Username=postgres;Password=postgres"
      Redis__ConnectionString: "redis:6379"
      Jwt__Key: "YourSuperSecretKeyThatIsAtLeast32CharactersLong!"
      Jwt__Issuer: "TaskFlow"
      Jwt__Audience: "TaskFlow"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # React frontend (nginx)
  frontend:
    build:
      context: ./taskflow-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
